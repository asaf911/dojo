<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Support - Dojo</title>
    <meta name="description" content="Contact the Dojo team for help with Dojo: Master Meditation." />
    <link rel="canonical" href="https://medidojo.com/support/" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" sizes="32x32" />
    <link rel="apple-touch-icon" href="/favicon.jpg" />
    <link rel="preconnect" href="https://fonts-api.wp.com" />
    <link
      rel="stylesheet"
      href="https://fonts-api.wp.com/css?family=Nunito:100,100italic,200,200italic,300,300italic,400,400italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic&amp;display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts-api.wp.com/css?family=Roboto+Slab:100,100italic,200,200italic,300,300italic,400,400italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic&amp;display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts-api.wp.com/css?family=Work+Sans:100,100italic,200,200italic,300,300italic,400,400italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic&amp;display=swap"
    />
    <link rel="preload" href="/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:title" content="Support - Dojo" />
    <meta property="og:description" content="Contact the Dojo team for help with Dojo: Master Meditation." />
    <meta property="og:url" content="https://medidojo.com/support/" />
    <meta property="og:site_name" content="Medidojo.com" />
    <meta property="og:image" content="https://medidojo.com/assets/dojo-app-store1-1.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://medidojo.com/assets/dojo-app-store1-1.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://medidojo.com/#organization",
            "name": "Medidojo Inc.",
            "url": "https://medidojo.com/",
            "logo": "https://medidojo.com/dojo-icon-edited.png"
          },
          {
            "@type": "ContactPage",
            "@id": "https://medidojo.com/support/#page",
            "url": "https://medidojo.com/support/",
            "name": "Support - Dojo",
            "description": "Contact the Dojo team for help with Dojo: Master Meditation.",
            "isPartOf": { "@id": "https://medidojo.com/#website" },
            "publisher": { "@id": "https://medidojo.com/#organization" }
          },
          {
            "@type": "WebSite",
            "@id": "https://medidojo.com/#website",
            "url": "https://medidojo.com/",
            "name": "Medidojo",
            "publisher": { "@id": "https://medidojo.com/#organization" }
          }
        ]
      }
    </script>
    <script type="module" src="/src/document-page.ts"></script>
  </head>
  <body>
    <header class="site-header site-header--solid" id="site-header" role="banner">
      <div class="site-header__inner">
        <a class="site-logo" href="/" aria-label="Dojo home">
          <img src="/dojo-icon-edited.png" width="46" height="37" alt="" />
        </a>
        <button
          type="button"
          class="menu-toggle"
          id="menu-toggle"
          aria-expanded="false"
          aria-controls="menu-panel"
          aria-label="Menu"
        >
          <span class="menu-toggle__bar" aria-hidden="true"></span>
          <span class="menu-toggle__bar" aria-hidden="true"></span>
          <span class="menu-toggle__bar" aria-hidden="true"></span>
        </button>
        <nav class="site-nav site-nav--desktop" aria-label="Primary">
          <a href="/#About">About</a>
          <a href="/privacy-policy/">Privacy policy</a>
          <a href="/support/" aria-current="page">Support</a>
        </nav>
      </div>
      <div class="site-nav-mobile" id="menu-panel">
        <nav aria-label="Primary mobile">
          <a href="/#About">About</a>
          <a href="/privacy-policy/">Privacy policy</a>
          <a href="/support/" aria-current="page">Support</a>
        </nav>
      </div>
    </header>

    <main class="region page-document__main" id="Support">
      <div class="container page-document__inner">
        <h1 class="page-document__title">Support</h1>

        <form id="support-form" class="support-form" name="Support" aria-label="Support">
          <div class="support-form__field">
            <label for="support-name">Name</label>
            <input id="support-name" name="name" type="text" autocomplete="name" placeholder="Name" />
          </div>
          <div class="support-form__field">
            <label for="support-email">Email</label>
            <input
              id="support-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Email"
              required
            />
          </div>
          <div class="support-form__field">
            <label for="support-message">Message</label>
            <textarea id="support-message" name="message" rows="4" placeholder="Message"></textarea>
          </div>
          <p class="support-form__hint">
            Prefer email? Reach us at
            <a href="mailto:support@medidojo.com">support@medidojo.com</a>.
          </p>
          <p id="support-form-status" class="support-form__status" role="status" hidden></p>
          <div class="support-form__actions">
            <button type="submit">Send</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <a class="site-logo" href="/" aria-label="Dojo home">
          <img src="/dojo-icon-edited.png" width="46" height="37" alt="" loading="lazy" />
        </a>
        <p class="site-footer__legal">Made in San Francisco California © 2026 All Rights Reserved</p>
      </div>
    </footer>
  </body>
</html>
